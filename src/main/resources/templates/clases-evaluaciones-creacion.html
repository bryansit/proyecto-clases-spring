<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Crear Evaluación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7fa; font-family: 'Arial', sans-serif; }
        .header { background-color: #003087; color: white; padding: 20px 0; text-align: center; border-bottom: 5px solid #ffcd00; }
        .main-content { max-width: 600px; margin: 30px auto; padding: 30px; background-color: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); }
        .btn-primary { background-color: #003087; border-color: #003087; }
        .btn-primary:hover { background-color: #002566; border-color: #002566; }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="bi bi-file-earmark-plus"></i> Crear Evaluación</h1>
    </div>

    <div class="container main-content">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/docente}">Panel Docente</a></li>
                <li class="breadcrumb-item"><a th:href="@{/docente/clases}">Gestión de Clases</a></li>
                <li class="breadcrumb-item"><a th:href="@{/docente/clase/{claseId}/evaluaciones(claseId=${clase.id})}">Evaluaciones</a></li>
                <li class="breadcrumb-item active" aria-current="page">Crear Evaluación</li>
            </ol>
        </nav>

		<form th:action="@{/docente/clase/{claseId}/evaluaciones/guardar(claseId=${clase.id})}" method="post" enctype="multipart/form-data">
		    <div class="mb-3">
		        <label for="nombre" class="form-label"><i class="bi bi-file-text"></i> Nombre de la Evaluación</label>
		        <input type="text" class="form-control" id="nombre" name="nombre" required placeholder="Ej: Examen Final">
		    </div>
		    <div class="mb-3">
		        <label for="instrucciones" class="form-label"><i class="bi bi-info-circle"></i> Instrucciones para el Estudiante</label>
		        <textarea class="form-control" id="instrucciones" name="instrucciones" rows="3" required placeholder="Ej: Completa el archivo Excel y súbelo antes del 30/10/2025"></textarea>
		    </div>
		    <div class="mb-3">
		        <label for="archivoExcel" class="form-label"><i class="bi bi-file-earmark-excel"></i> Subir Archivo Excel (Opcional)</label>
		        <input type="file" class="form-control" id="archivoExcel" name="archivoExcel" accept=".xlsx,.xls">
		        <div class="form-text">Sube un archivo Excel con las instrucciones o datos de la evaluación.</div>
		    </div>
		    <div class="d-grid gap-2">
		        <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-save"></i> Guardar Evaluación</button>
		        <a th:href="@{/docente/clase/{claseId}(claseId=${clase.id})}" class="btn btn-secondary"><i class="bi bi-x-circle"></i> Cancelar</a>
		    </div>
		</form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdlZxGxv11gykA==" crossorigin="anonymous"></script>
</html>
