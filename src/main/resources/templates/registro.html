<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro de Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7fa; font-family: 'Arial', sans-serif; }
        .header { background-color: #003087; color: white; padding: 20px 0; text-align: center; border-bottom: 5px solid #ffcd00; }
        .registro-container { max-width: 600px; margin: 50px auto; padding: 30px; background-color: white; border-radius: 10px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); }
        .btn-primary { background-color: #003087; border-color: #003087; }
        .btn-primary:hover { background-color: #002566; border-color: #002566; }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="bi bi-person-add"></i> Registro de Nuevo Usuario</h1>
    </div>
    <div class="registro-container">
        <h2 class="text-center mb-4">Crear Cuenta</h2>
        
        <div th:if="${error}" class="alert alert-danger" role="alert">
            <span th:text="${error}"></span>
        </div>
        
		<form th:action="@{/registro}" th:object="${usuario}" method="post" class="needs-validation" novalidate>
		    <div class="mb-3">
		        <label for="dni" class="form-label"><i class="bi bi-card-heading"></i> DNI / Cédula</label>
		        <input type="text" class="form-control" id="dni" th:field="*{dni}" required placeholder="Número de Identificación">
		        <div class="invalid-feedback">Por favor, ingresa tu DNI/Cédula.</div>
		    </div>
		    <div class="mb-3">
		        <label for="email" class="form-label"><i class="bi bi-envelope"></i> Correo Electrónico</label>
		        <input type="email" class="form-control" id="email" th:field="*{email}" required placeholder="correo@institucion.com">
		        <div class="invalid-feedback">Por favor, ingresa un correo válido.</div>
		    </div>
		    <div class="mb-3">
		        <label for="password" class="form-label"><i class="bi bi-lock"></i> Contraseña</label>
		        <input type="password" class="form-control" id="password" th:field="*{password}" required placeholder="Crea tu contraseña">
		        <div class="invalid-feedback">Por favor, ingresa una contraseña.</div>
		    </div>
		    <div class="mb-3">
		        <label for="rol" class="form-label"><i class="bi bi-person-badge"></i> Tipo de Usuario</label>
		        <select class="form-select" id="rol" th:field="*{rol}" required>
		            <option value="" disabled selected>Selecciona el tipo de usuario</option>
		            <option value="ESTUDIANTE">Estudiante</option>
		            <option value="DOCENTE">Docente</option>
		        </select>
		        <div class="invalid-feedback">Debes elegir si eres Docente o Estudiante.</div>
		    </div>
		    <button type="submit" class="btn btn-primary w-100 mb-3"><i class="bi bi-check-circle"></i> Registrar Cuenta</button>
		    <a th:href="@{/}" class="btn btn-outline-secondary w-100"><i class="bi bi-arrow-left"></i> Volver al Login</a>
		</form>
    </div>
    <div class="footer">
        <p><i class="bi bi-info-circle"></i> &copy; 2025 Institución Educativa. Todos los derechos reservados.</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdlZxGxv11gykA==" crossorigin="anonymous"></script>
    <script>
        (function () {
            'use strict';
            var forms = document.querySelectorAll('.needs-validation');
            Array.prototype.slice.call(forms)
                .forEach(function (form) {
                    form.addEventListener('submit', function (event) {
                        if (!form.checkValidity()) {
                            event.preventDefault();
                            event.stopPropagation();
                        }
                        form.classList.add('was-validated');
                    }, false);
                });
        })();
    </script>
</body>
</html>
