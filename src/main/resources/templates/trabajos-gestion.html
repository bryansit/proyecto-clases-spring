<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestionar Trabajos - Evaluación Institucional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7fa; font-family: 'Arial', sans-serif; }
        .header { background-color: #003087; color: white; padding: 20px 0; text-align: center; border-bottom: 5px solid #ffcd00; }
        .main-content { padding: 30px; }
        .btn-primary { background-color: #003087; border-color: #003087; }
        .btn-primary:hover { background-color: #002566; border-color: #002566; }
        .table-responsive { margin-top: 20px; }
        .filter-select { margin-bottom: 15px; }
    </style>
</head>
<body>
    
    <div class="header">
        <h1><i class="bi bi-people"></i> Gestionar Trabajos</h1>
        <p><i class="bi bi-clipboard-check"></i> Vista de Trabajos Individuales y Grupales</p>
    </div>

    <div class="container main-content">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/docente}">Panel Docente</a></li>
                <li class="breadcrumb-item active" aria-current="page">Gestionar Trabajos</li>
            </ol>
        </nav>

        <div class="filter-select">
            <label for="filtroTipo" class="form-label">Filtrar por Tipo:</label>
            <select id="filtroTipo" class="form-select" onchange="filtrarTabla()">
                <option value="todos">Todos</option>
                <option value="INDIVIDUAL">Individuales</option>
                <option value="GRUPAL">Grupales</option>
            </select>
        </div>

        <h4>Trabajos Entregados</h4>
        <div class="table-responsive">
            <table class="table table-striped" id="tablaTrabajos">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>Rúbrica</th>
                        <th>Estado</th>
                        <th>Nota</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="trabajo : ${trabajos}">
                        <td th:text="${trabajo.nombre}"></td>
                        <td th:text="${trabajo.tipo}"></td>
                        <td th:text="${trabajo.rubricaNombre}"></td>
                        <td th:text="${trabajo.estado}"></td>
                        <td th:text="${trabajo.nota != null ? trabajo.nota : 'Sin nota'}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="text-center mt-3">
            <a th:href="@{/docente}" class="btn btn-secondary">Volver al Panel</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdlZxGxv11gykA==" crossorigin="anonymous"></script>
    <script>
        function filtrarTabla() {
            const filtro = document.getElementById('filtroTipo').value;
            const filas = document.querySelectorAll('#tablaTrabajos tbody tr');

            filas.forEach(fila => {
                const tipo = fila.cells[1].textContent.trim();
                if (filtro === 'todos' || tipo === filtro) {
                    fila.style.display = '';
                } else {
                    fila.style.display = 'none';
                }
            });
        }

        window.onload = filtrarTabla;
    </script>
</body>
</html>
