<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Crear Clase Manualmente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7fa; font-family: 'Arial', sans-serif; }
        .header { background-color: #003087; color: white; padding: 20px 0; text-align: center; border-bottom: 5px solid #ffcd00; }
        .main-content { max-width: 600px; margin: 30px auto; padding: 30px; background-color: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); }
        .btn-primary { background-color: #003087; border-color: #003087; }
        .btn-primary:hover { background-color: #002566; border-color: #002566; }
    </style>
</head>
<body>
    
    <div class="header">
        <h1><i class="bi bi-pencil-square"></i> Crear Clase Manualmente</h1>
    </div>

    <div class="container main-content">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/docente}">Panel Docente</a></li>
                <li class="breadcrumb-item"><a th:href="@{/docente/clases}">Gestión de Clases</a></li>
                <li class="breadcrumb-item active" aria-current="page">Creación Manual</li>
            </ol>
        </nav>
        
        <form action="/docente/clases/guardar" method="post">
            <div class="mb-3">
                <label for="nombreDocente" class="form-label"><i class="bi bi-person-circle"></i> Nombre Completo del Docente</label>
                <input type="text" class="form-control" id="nombreDocente" name="nombreDocente" placeholder="Ingresa tu nombre completo" required>
                <input type="hidden" name="rol" value="DOCENTE">
            </div>
            <div class="mb-3">
                <label for="nombre" class="form-label"><i class="bi bi-book"></i> Nombre de la Clase</label>
                <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ej: Matemáticas 5to B" required>
            </div>
            <div class="mb-3">
                <label for="nivel" class="form-label"><i class="bi bi-calendar-check"></i> Nivel/Grado</label>
                <select class="form-select" id="nivel" name="nivel" required>
                    <option value="">Seleccione un nivel</option>
                    <option value="5to">5to Grado</option>
                    <option value="6to">6to Grado</option>
                    <option value="1ro_sec">1ro Secundaria</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="codigo" class="form-label"><i class="bi bi-hash"></i> Código Único (Opcional)</label>
                <input type="text" class="form-control" id="codigo" name="codigo" placeholder="Ej: MAT5B2025">
                <div class="form-text">Si lo dejas vacío, se generará uno automáticamente.</div>
            </div>
            <hr>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-save"></i> Guardar Clase</button>
                <a th:href="@{/docente/clases}" class="btn btn-secondary"><i class="bi bi-x-circle"></i> Cancelar</a>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script>
	document.querySelector('form').addEventListener('submit', function(e) {
	    var codigoInput = document.getElementById('codigo');
	    if (!codigoInput.value.trim()) {
	        // Genera un código aleatorio de 6 dígitos alfanumérico
	        codigoInput.value = Math.random().toString(36).substring(2,8).toUpperCase();
	    }
	});
	</script>

</body>
</html>
